name: Update Game Catalogue

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '**.html'
      - 'generate-games-json.js'

jobs:
  generate:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate games.json
        run: node generate-games-json.js

      - name: Commit games.json if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add games.json
          git diff --cached --quiet || git commit -m "chore: update games.json [skip ci]"
          git push
